<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Allocation | Register Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #050b14;
            --neon-cyan: #00f3ff;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --glass-bg: rgba(10, 15, 28, 0.7);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 102, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(0, 243, 255, 0.1) 0%, transparent 50%);
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(5, 11, 20, 0.5);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 243, 255, 0.1);
        }

        .logo { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--neon-cyan); }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; text-transform: uppercase; transition: color 0.3s ease; }
        .nav-links a:hover { color: var(--neon-cyan); }

        .form-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }

        .auth-card {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 40px; width: 100%; max-width: 500px; /* Thoda wide kiya taaki details fit ho jayein */
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.05);
            position: relative;
        }

        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 60%; height: 2px; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan);
        }

        .card-header { text-align: center; margin-bottom: 30px; }
        .card-header h2 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #fff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }
        .card-header p { color: var(--text-muted); font-size: 0.85rem; letter-spacing: 1px; }

        .django-form p { margin-bottom: 15px; }
        .django-form label { display: block; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .django-form input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); padding: 12px 15px; border-radius: 6px; font-family: 'Inter', sans-serif; transition: all 0.3s ease;
        }
        
        .django-form input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); background: rgba(0, 243, 255, 0.05); }
        .django-form span.helptext { display: block; font-size: 0.75rem; color: var(--text-muted); margin-top: 5px; }
        .django-form ul.errorlist { color: #ff4757; font-size: 0.8rem; list-style: none; margin-top: 5px; }

        /* 🔥 NAYI CSS DOB AUR CHECKBOX KE LIYE 🔥 */
        .django-form input[type="date"] {
            color-scheme: dark; /* Calendar ko dark mode mein layega */
        }
        
        .django-form input[type="checkbox"] {
            width: auto;
            display: inline-block;
            margin-right: 10px;
            accent-color: var(--neon-cyan); /* Checkbox ko cyan color dega */
            transform: scale(1.3);
            cursor: pointer;
            vertical-align: middle;
        }

        .django-form label[for="id_terms_confirmed"] {
            display: inline; /* Checkbox ke bagal me label layega */
            color: var(--text-main);
            text-transform: none;
            letter-spacing: 0.5px;
            font-size: 0.95rem;
            cursor: pointer;
            vertical-align: middle;
        }

        .submit-btn {
            width: 100%; background: rgba(0, 243, 255, 0.1); color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); padding: 14px; border-radius: 6px;
            font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; margin-top: 20px;
        }
        .submit-btn:hover { background: var(--neon-cyan); color: var(--bg-deep); box-shadow: 0 0 20px rgba(0, 243, 255, 0.5); }

        .switch-link { text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); }
        .switch-link a { color: var(--neon-cyan); text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        .switch-link a:hover { text-shadow: 0 0 8px var(--neon-cyan); }
    </style>
</head>
<body>

    <nav>
        <a href="{% url 'home' %}" class="logo">Smart<span>System</span></a>
        <div class="nav-links">
            <a href="{% url 'home' %}"><i class="fas fa-arrow-left"></i> Return Home</a>
        </div>
    </nav>

    <div class="form-wrapper">
        <div class="auth-card">
            <div class="card-header">
                <h2>Initialize Node</h2>
                <p>Register to access the network</p>
            </div>

            <form method="POST" action="{% url 'register' %}" class="django-form">
                {% csrf_token %}
                
                {{ form.as_p }}

                <button type="submit" class="submit-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="switch-link">
                <p>Already in the system? <a href="{% url 'login' %}">Authenticate Here</a></p>
            </div>
        </div>
    </div>

</body>
</html>
