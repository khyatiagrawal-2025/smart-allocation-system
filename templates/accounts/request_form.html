{% extends 'base.html' %}

{% block title %}Create Request{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-8">
        <div class="glass-card">
            <h3 class="mb-4 border-bottom border-secondary pb-2"><i class="fa-solid fa-satellite-dish" style="color: #58a6ff;"></i> Broadcast Help Request</h3>
            
            <form method="POST" action="">
                {% csrf_token %}
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-info">Problem Category</label>
                        <select name="problem_category" class="form-select bg-dark text-light border-secondary shadow-none">
                            <option value="Blood Bank">Blood Bank</option>
                            <option value="Medical">Medical Emergency</option>
                            <option value="Home Rent">Home / Shelter</option>
                            <option value="Tech Support">Tech / IT Support</option>
                        </select>
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0">
                        <label class="form-label text-warning">Priority Level</label>
                        <select name="priority" class="form-select bg-dark text-light border-secondary shadow-none">
                            <option value="High" style="color: #ff5555; font-weight: bold;">High (Critical)</option>
                            <option value="Medium" style="color: #ffcc00;">Medium</option>
                            <option value="Low" style="color: #55ff55;">Low</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" style="color: #ff5555;"><i class="fa-solid fa-lock"></i> Private Details (Locked)</label>
                    <p class="text-secondary" style="font-size: 0.85rem;">*This information is securely locked and only shared after a volunteer accepts your request.</p>
                    <textarea name="private_details" class="form-control bg-dark text-light border-secondary shadow-none" rows="4" placeholder="Enter exact address, phone number, and sensitive details here..." required></textarea>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-neon-blue px-4 py-2"><i class="fa-solid fa-radar"></i> Scan for Volunteers</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
